# Configuracao insegura proposital para testes
ServerSignature Off
ServerTokens Prod
TraceEnable Off

# Headers de seguranca - propositalmente ausentes para gerar alerts no modulo 4
# HSTS, X-Frame-Options, X-Content-Type-Options, CSP, etc. NAO configurados

<Directory /var/www/html>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Diretorio com listagem habilitada
<Directory /var/www/html/uploads>
    Options +Indexes
</Directory>
